name: LittleRip
options:
  bundleIdPrefix: com.maxautomize
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  LittleRip:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        includes:
          - "*.swift"
        excludes:
          - "Package.swift"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "Little Rip"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Little Rip needs microphone access to hear you speak. Audio stays on your device."
        NSSpeechRecognitionUsageDescription: "Little Rip uses speech recognition to understand what you say. All processing happens on-device."
        NSBluetoothAlwaysUsageDescription: "Little Rip uses Bluetooth to connect to external microphones and speakers for a hands-free experience."
        NSBluetoothPeripheralUsageDescription: "Little Rip uses Bluetooth to connect to external microphones and speakers."
        UIBackgroundModes:
          - audio
          - bluetooth-central
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxautomize.LittleRip
        PRODUCT_NAME: LittleRip
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
